<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>COE Voting Admin Dashboard</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: url("images/bg.jfif") no-repeat center center fixed;
      background-size: cover;
      color: #f5f5f5;
    }
    h1 {
      text-align: center;
      font-family: Georgia, serif;
      font-size: 2em;
      color: #FFD700;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px #000;
    }
    h2 {
      margin-top: 40px;
      font-size: 1.5em;
      color: #FFD700;
      border-bottom: 2px solid #FFD700;
      display: inline-block;
      padding-bottom: 5px;
      text-shadow: 1px 1px 3px #000;
    }
    .candidate-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      justify-items: center;
      margin-top: 20px;
    }
    .candidate-card {
      background: #fff;
      border: 2px solid #FFD700;
      border-radius: 12px;
      width: 100%;
      max-width: 220px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      color: #333;
    }
    .candidate-card img {
      width: 100%;
      height: auto;
      border-radius: 10px;
      margin-bottom: 10px;
    }
    .votes { font-weight: bold; color: #3F704D; margin-top: 5px; }
    .fb { font-size: 0.95em; color: #1a73e8; margin-top: 3px; }
    .darling { font-weight: bold; color: #d32f2f; margin-top: 5px; }
    .percent { font-size: 0.9em; color: #555; margin-top: 3px; }
    form {
      margin-top: 40px;
      background: rgba(255,255,255,0.9);
      padding: 20px;
      border-radius: 10px;
      color: #333;
    }
    form h2 { color: #3F704D; border: none; text-shadow: none; }
    form label { display: block; margin-top: 10px; }
    form input, form select { padding: 5px; width: 100%; max-width: 300px; }
    form button {
      margin-top: 15px;
      padding: 10px 20px;
      background: #FFD700;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    form button:hover { background: #e6c200; }
    .hidden { display: none; }
    table {
      width: 100%;
      background: #fff;
      color: #333;
      border-collapse: collapse;
      margin-top: 20px;
    }
    table th, table td {
      border: 1px solid #FFD700;
      padding: 8px;
      text-align: center;
    }
    table th {
      background: #FFD700;
      color: #333;
    }
    #searchInput {
      margin-top: 10px;
      padding: 8px;
      width: 100%;
      max-width: 300px;
      border-radius: 5px;
      border: 1px solid #FFD700;
    }
    .invalid { background-color: #f8d7da; }
    #error-message {
      margin-top: 10px;
      color: #ff4444;
      font-weight: bold;
    }
    .invalidate-btn {
      padding: 5px 10px;
      background: #d32f2f;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .invalidate-btn:hover {
      background: #b71c1c;
    }
  </style>
</head>
<body>
  <h1>Admin Dashboard – Live Results</h1>

  <!-- Login Section -->
  <div id="login-section">
    <h2>Admin Login</h2>
    <label for="password">Password:</label>
    <input type="password" id="password">
    <button onclick="login()">Login</button>
    <p id="login-message"></p>
  </div>

  <!-- Dashboard Section (hidden until login) -->
  <div id="dashboard-section" class="hidden">
    <!-- Mr. Candidates -->
    <h2>Mr. Candidates</h2>
    <div class="candidate-grid" id="mrCandidates"></div>

    <!-- Ms. Candidates -->
    <h2>Ms. Candidates</h2>
    <div class="candidate-grid" id="msCandidates"></div>

    <!-- Raw Votes Table -->
    <h2>Raw Votes</h2>
    <input type="text" id="searchInput" placeholder="Search by Ticket ID or Student Name">
    <table id="votesTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Ticket ID</th>
          <th>Student Name</th>
          <th>Candidate ID</th>
          <th>Gender</th>
          <th>Timestamp</th>
          <th>Valid?</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <p id="error-message"></p>

    <!-- Admin Form to Update FB Reactions -->
    <form id="fbForm">
      <h2>Update FB Reactions</h2>
      <label for="candidate_select">Select Candidate:</label>
      <select id="candidate_select" name="candidate_id" required></select>

      <label for="reactions">FB Reactions:</label>
      <input type="number" id="reactions" name="reactions" required>

      <button type="submit">Update</button>
    </form>
    <p id="update-message"></p>

    <button onclick="logout()">Logout</button>
  </div>

  <script>
    let candidates = [];
    let votes = [];

    async function login() {
      const password = document.getElementById("password").value;
      const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password })
      });
      const data = await res.json();
      document.getElementById("login-message").innerText = data.message;
      if (res.status === 200) {
        document.getElementById("login-section").classList.add("hidden");
        document.getElementById("dashboard-section").classList.remove("hidden");
        loadResults();
        setInterval(loadResults, 60000);
      }
    }

    async function logout() {
      const res = await fetch("/logout", { method: "POST" });
      const data = await res.json();
      alert(data.message);
      document.getElementById("dashboard-section").classList.add("hidden");
      document.getElementById("login-section").classList.remove("hidden");
    }

    async function loadResults() {
      try {
        let res = await fetch("/results");
        if (!res.ok) {
          document.getElementById("error-message").innerText =
            "Error loading results (status " + res.status + ")";
          return;
        }
        let data = await res.json();

        candidates = data.candidates;
        votes = data.votes;

        document.getElementById("mrCandidates").innerHTML = "";
        document.getElementById("msCandidates").innerHTML = "";
        document.getElementById("candidate_select").innerHTML = "";
        document.querySelector("#votesTable tbody").innerHTML = "";
        document.getElementById("error-message").innerText = "";

        // Candidate cards
        candidates.forEach(cand => {
          let card = document.createElement("div");
          card.className = "candidate-card";
          card.innerHTML = `
            <img src="images/${cand.image}" alt="${cand.name}">
            <h3>${cand.name}</h3>
            <p>${cand.org} • ${cand.program}</p>
            <div class="votes">System Votes: ${cand.system_votes}</div>
            <div class="percent">System %: ${cand.system_percent}%</div>
            <div class="fb">FB Reactions: ${cand.fb_reactions}</div>
            <div class="percent">FB %: ${cand.fb_percent}%</div>
            <div class="darling">Darling Score: ${cand.darling_score}</div>
          `;
          if (cand.gender === "male") {
            document.getElementById("mrCandidates").appendChild(card);
          } else {
            document.getElementById("msCandidates").appendChild(card);
          }

          // Add to dropdown
          let option = document.createElement("option");
          option.value = cand.id;
          option.text = `${cand.name} (${cand.org})`;
          document.getElementById("candidate_select").appendChild(option);
        });

        // Raw votes table
        votes.forEach(v => {
          let row = document.createElement("tr");
          if (!v.is_valid) row.classList.add("invalid");
          row.innerHTML = `
            <td>${v.id}</td>
            <td>${v.ticket_id}</td>
            <td>${v.student_name}</td>
            <td>${v.candidate_id}</td>
            <td>${v.gender}</td>
            <td>${v.timestamp}</td>
            <td>${v.is_valid ? "Valid" : "Invalid"}</td>
            <td>
              ${v.is_valid ? `<button class="invalidate-btn" onclick="invalidateVote(${v.id})">Invalidate</button>` : ""}
            </td>
          `;
          document.querySelector("#votesTable tbody").appendChild(row);
        });

      } catch (err) {
        console.error("Error loading results:", err);
        document.getElementById("error-message").innerText =
          "Error loading results: " + err.message;
      }
    }

    // Search filter for votes table
    document.getElementById("searchInput").addEventListener("keyup", function() {
      const filter = this.value.toLowerCase();
      const rows = document.querySelectorAll("#votesTable tbody tr");
      rows.forEach(row => {
        const ticketId = row.cells[1].innerText.toLowerCase();
        const studentName = row.cells[2].innerText.toLowerCase();
        if (ticketId.includes(filter) || studentName.includes(filter)) {
          row.style.display = "";
        } else {
          row.style.display = "none";
        }
      });
    });

    // Handle FB form submission
    document.getElementById("fbForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      let candidate_id = document.getElementById("candidate_select").value;
      let reactions = document.getElementById("reactions").value;

      try {
        const res = await fetch("/update_fb", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ candidate_id, reactions })
        });
        if (!res.ok) {
          document.getElementById("update-message").innerText =
            "Error updating FB reactions (status " + res.status + ")";
          return;
        }
        const data = await res.json();
        document.getElementById("update-message").innerText = data.message;
        loadResults();
      } catch (err) {
        console.error("Error updating FB reactions:", err);
        document.getElementById("update-message").innerText =
          "Error updating FB reactions: " + err.message;
      }
    });

    // Invalidate vote function
    async function invalidateVote(voteId) {
      try {
        const res = await fetch("/invalidate_vote", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ vote_id: voteId })
        });
        const data = await res.json();
        alert(data.message);
        loadResults(); // refresh after invalidation
      } catch (err) {
        console.error("Error invalidating vote:", err);
        alert("Error invalidating vote: " + err.message);
      }
    }
  </script>
</body>
</html>
