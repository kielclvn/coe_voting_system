<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Darling of the Crowd Admin</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: url("images/bg.jfif") no-repeat center center fixed;
      background-size: cover;
      color: #f5f5f5;
    }
    h1 {
      text-align: center;
      font-family: Georgia, serif;
      font-size: 2em;
      color: #FFD700;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px #000;
    }
    table {
      width: 100%;
      background: #fff;
      color: #333;
      border-collapse: collapse;
      margin-top: 20px;
    }
    table th, table td {
      border: 1px solid #FFD700;
      padding: 8px;
      text-align: center;
    }
    table th {
      background: #FFD700;
      color: #333;
    }
    input[type="number"] {
      padding: 5px;
      width: 80px;
      border: 1px solid #FFD700;
      border-radius: 5px;
    }
    button {
      padding: 6px 12px;
      background: #FFD700;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      color: #333;
    }
    button:hover { background: #e6c200; }
  </style>
</head>
<body>
  <h1>Darling of the Crowd - Admin Encoding</h1>

  <form method="POST">
    <table>
      <thead>
        <tr>
          <th>Candidate</th>
          <th>Gender</th>
          <th>FB Reacts</th>
          <th>Site Votes</th>
          <th>Save</th>
        </tr>
      </thead>
      <tbody>
        {% for c in candidates %}
        <tr>
          <td>{{ c["name"] }}</td>
          <td>{{ c["gender"] }}</td>
          <td><input type="number" name="fb_reacts" value="{{ c["fb_reacts"] }}" min="0"></td>
          <td><input type="number" name="site_votes" value="{{ c["site_votes"] }}" min="0"></td>
          <td>
            <input type="hidden" name="candidate_id" value="{{ c["id"] }}">
            <button type="submit">Update</button>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </form>
</body>
</html>
