<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Darling of the Crowd Results</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: url("images/bg.jfif") no-repeat center center fixed;
      background-size: cover;
      color: #f5f5f5;
    }
    h1 {
      text-align: center;
      font-family: Georgia, serif;
      font-size: 2em;
      color: #FFD700;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px #000;
    }
    h2 {
      font-size: 1.5em;
      color: #FFD700;
      border-bottom: 2px solid #FFD700;
      display: inline-block;
      padding-bottom: 5px;
      text-shadow: 1px 1px 3px #000;
    }
    .candidate-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    table {
      width: 100%;
      background: #fff;
      color: #333;
      border-collapse: collapse;
      margin-top: 10px;
    }
    table th, table td {
      border: 1px solid #FFD700;
      padding: 8px;
      text-align: center;
    }
    table th {
      background: #FFD700;
      color: #333;
    }
    .darling {
      background-color: #ffeeba;
      font-weight: bold;
      color: #d32f2f;
    }
  </style>
</head>
<body>
  <h1>Darling of the Crowd Results</h1>

  <div class="candidate-grid">
    <!-- Mr Results -->
    <div>
      <h2>Mr Results</h2>
      <table>
        <thead>
          <tr>
            <th>Placement</th>
            <th>Candidate</th>
            <th>Final Score</th>
          </tr>
        </thead>
        <tbody>
          <tr class="darling"><td>1</td><td>Mr Candidate A</td><td>85.50%</td></tr>
          <tr><td>2</td><td>Mr Candidate B</td><td>78.20%</td></tr>
          <tr><td>3</td><td>Mr Candidate C</td><td>70.10%</td></tr>
          <!-- add more rows as per Excel -->
        </tbody>
      </table>
    </div>

    <!-- Ms Results -->
    <div>
      <h2>Ms Results</h2>
      <table>
        <thead>
          <tr>
            <th>Placement</th>
            <th>Candidate</th>
            <th>Final Score</th>
          </tr>
        </thead>
        <tbody>
          <tr class="darling"><td>1</td><td>Ms Candidate X</td><td>88.40%</td></tr>
          <tr><td>2</td><td>Ms Candidate Y</td><td>80.75%</td></tr>
          <tr><td>3</td><td>Ms Candidate Z</td><td>72.30%</td></tr>
          <!-- add more rows as per Excel -->
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
